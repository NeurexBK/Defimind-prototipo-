<title>DefiMind — Demo Interativa</title>
<style>
  :root{
    --bg:#EFEEE9; --ink:#131A16; --ink-2:#4C564F; --ink-3:#7A847D; --card:#FFFFFF; --border:#DDDCD4;
    --green:#0E7A4A; --green-deep:#0A5C38; --mint:#E7F2EB; --gold:#A07C2C; --gold-soft:#F5EEDC;
  }
  @media (prefers-color-scheme: dark){
    :root{--bg:#0B0F0D;--ink:#EDF1EE;--ink-2:#ADB8B0;--ink-3:#77837B;--card:#151C18;--border:#242D27;--green:#2FB673;--green-deep:#8FE0B4;--mint:#12241B;--gold:#C9A356;--gold-soft:#2A2314}
  }
  :root[data-theme="dark"]{--bg:#0B0F0D;--ink:#EDF1EE;--ink-2:#ADB8B0;--ink-3:#77837B;--card:#151C18;--border:#242D27;--green:#2FB673;--green-deep:#8FE0B4;--mint:#12241B;--gold:#C9A356;--gold-soft:#2A2314}
  :root[data-theme="light"]{--bg:#EFEEE9;--ink:#131A16;--ink-2:#4C564F;--ink-3:#7A847D;--card:#FFFFFF;--border:#DDDCD4;--green:#0E7A4A;--green-deep:#0A5C38;--mint:#E7F2EB;--gold:#A07C2C;--gold-soft:#F5EEDC}

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0;font-size:inherit}
  button:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:8px}

  /* ============ ESCOLHA ============ */
  .hub{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;padding:40px 20px 56px;text-align:center;
  }
  .logo{font-size:34px;font-weight:800;letter-spacing:-0.02em}
  .logo i{font-style:normal;color:var(--green)}
  .tagline{font-size:15px;color:var(--ink-2);margin:0}
  .ask{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin:34px 0 16px}
  .choices{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:760px}
  .choice{
    flex:1 1 300px;max-width:352px;text-align:left;
    background:var(--card);border:1px solid var(--border);border-radius:24px;padding:26px 24px 22px;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    display:flex;flex-direction:column;gap:10px;position:relative;
  }
  .choice:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(10,20,14,.14);border-color:var(--green)}
  .choice:active{transform:scale(.98)}
  @media (prefers-reduced-motion: reduce){.choice,.choice:hover,.choice:active{transform:none;transition:none}}
  .choice .emoji{font-size:38px;line-height:1}
  .choice h2{margin:2px 0 0;font-size:19px;font-weight:800;letter-spacing:-0.01em}
  .choice p{margin:0;font-size:13.5px;color:var(--ink-2)}
  .choice ul{margin:4px 0 6px;padding-left:18px;font-size:13px;color:var(--ink-2)}
  .choice li{margin-bottom:3px}
  .choice .go{
    margin-top:auto;display:inline-flex;align-items:center;gap:8px;align-self:flex-start;
    background:var(--green);color:#fff;font-size:14px;font-weight:800;border-radius:999px;padding:11px 20px;
  }
  .choice .reco{
    position:absolute;top:16px;right:16px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
    background:var(--gold-soft);color:var(--gold);border-radius:999px;padding:4px 10px;display:none;
  }
  .choice.recommended .reco{display:inline-block}
  .hub-foot{font-size:12px;color:var(--ink-3);margin-top:30px;max-width:46ch}

  /* ============ VISUALIZADOR ============ */
  .viewer{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;background:var(--bg)}
  .viewer.open{display:flex}
  .viewer-bar{
    flex:none;display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:8px 14px;background:var(--card);border-bottom:1px solid var(--border);
  }
  .viewer-bar .vb-logo{font-size:14px;font-weight:800}
  .viewer-bar .vb-logo i{font-style:normal;color:var(--green)}
  .viewer-bar .vb-mode{font-size:12px;color:var(--ink-3);font-weight:600}
  .switch-btn{
    display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;
    background:var(--mint);color:var(--green-deep);border-radius:999px;padding:8px 15px;
  }
  .viewer iframe{flex:1;width:100%;border:none;background:var(--bg)}
</style>

<div class="hub" id="hub">
  <div class="logo">DefiMind<i>.</i></div>
  <p class="tagline">Sua conta em dólar que rende todo dia — demonstração interativa</p>

  <div class="ask">Como você quer ver a demo?</div>
  <div class="choices">
    <button class="choice" id="chDesktop" data-mode="desktop">
      <span class="reco">Para este aparelho</span>
      <span class="emoji">💻</span>
      <h2>No computador</h2>
      <p>A plataforma completa, como no navegador.</p>
      <ul>
        <li>Navegação no topo, telas amplas</li>
        <li>Portfólio com gráficos grandes</li>
        <li>Ideal para telão e notebook</li>
      </ul>
      <span class="go">Abrir versão computador →</span>
    </button>

    <button class="choice" id="chMobile" data-mode="mobile">
      <span class="reco">Para este aparelho</span>
      <span class="emoji">📱</span>
      <h2>No celular</h2>
      <p>O aplicativo, com abas embaixo.</p>
      <ul>
        <li>Parece um app instalado de verdade</li>
        <li>Caixinha rendendo ao vivo na tela inicial</li>
        <li>Ideal para pôr na mão do investidor</li>
      </ul>
      <span class="go">Abrir versão celular →</span>
    </button>
  </div>

  <p class="hub-foot">Tudo é clicável nas duas versões: cartão, potes em USDC, Caixinha, conquistas e assistente. Dados ilustrativos para demonstração.</p>
</div>

<div class="viewer" id="viewer">
  <div class="viewer-bar">
    <span class="vb-logo">DefiMind<i>.</i> <span class="vb-mode" id="vbMode"></span></span>
    <button class="switch-btn" id="switchBtn">⇄ Trocar versão</button>
  </div>
  <iframe id="frameDesktop" title="Demo DefiMind — versão computador"></iframe>
  <iframe id="frameMobile" title="Demo DefiMind — versão celular"></iframe>
</div>

<template id="tpl-desktop">
<title>DefiMind — Demo Interativa</title>
<style>
  /* ============ TOKENS — página externa (tema claro/escuro) ============ */
  :root{
    --pg-bg:#EFEEE9;
    --pg-ink:#131A16;
    --pg-ink-2:#4C564F;
    --pg-ink-3:#7A847D;
    --pg-border:#DDDCD4;
    --pg-green:#0E7A4A;
  }
  @media (prefers-color-scheme: dark){
    :root{--pg-bg:#0B0F0D;--pg-ink:#EDF1EE;--pg-ink-2:#ADB8B0;--pg-ink-3:#77837B;--pg-border:#242D27;--pg-green:#2FB673}
  }
  :root[data-theme="dark"]{--pg-bg:#0B0F0D;--pg-ink:#EDF1EE;--pg-ink-2:#ADB8B0;--pg-ink-3:#77837B;--pg-border:#242D27;--pg-green:#2FB673}
  :root[data-theme="light"]{--pg-bg:#EFEEE9;--pg-ink:#131A16;--pg-ink-2:#4C564F;--pg-ink-3:#7A847D;--pg-border:#DDDCD4;--pg-green:#0E7A4A}

  /* ============ TOKENS — o app DefiMind (objeto de design, tema fixo) ============ */
  :root{
    --bg:#F8F8F5; --card:#FFFFFF; --ink:#121814; --ink-2:#525C55; --ink-3:#8A948C; --line:#E9E9E2;
    --green:#0E7A4A; --green-deep:#0A5C38; --green-bright:#16A45E; --mint:#E7F2EB;
    --gold:#A07C2C; --gold-soft:#F5EEDC; --rust:#B0563A; --rust-soft:#F7E8E2; --red:#C03A2B; --r:20px;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--pg-bg);color:var(--pg-ink);
    font-family:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0;font-size:inherit}
  button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:6px}

  .wrap{max-width:1240px;margin:0 auto;padding:26px 20px 56px}
  .intro{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px}
  .wordmark{font-size:19px;font-weight:800;letter-spacing:-0.02em}
  .wordmark i{font-style:normal;color:var(--pg-green)}
  .intro small{font-size:13px;color:var(--pg-ink-3)}

  .browser{
    background:#10150F;border-radius:18px;overflow:hidden;
    box-shadow:0 24px 64px rgba(10,20,14,.18), 0 2px 10px rgba(10,20,14,.08);
    border:1px solid var(--pg-border);
  }
  .browser-bar{display:flex;align-items:center;gap:8px;background:#10150F;padding:11px 16px}
  .browser-bar i{width:10px;height:10px;border-radius:999px;background:#3A443C}
  .browser-bar .url{margin-left:10px;font-size:12px;color:#9BA69E;background:#1B211B;border-radius:8px;padding:4px 14px}
  .foot{text-align:center;font-size:12.5px;color:var(--pg-ink-3);margin-top:18px}

  /* ============ O APP ============ */
  .app{background:var(--bg);color:var(--ink);min-height:760px;position:relative;font-size:15px}

  .nav{
    display:flex;align-items:center;gap:4px;
    padding:12px 24px;background:var(--card);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20;flex-wrap:wrap;
  }
  .nav .logo{font-size:17px;font-weight:800;letter-spacing:-0.02em;margin-right:14px}
  .nav .logo i{font-style:normal;color:var(--green)}
  .navlinks{display:flex;gap:2px;flex-wrap:wrap}
  .navlink{font-size:13.5px;font-weight:600;color:var(--ink-2);padding:8px 13px;border-radius:999px}
  .navlink:hover{background:var(--bg)}
  .navlink.active{background:var(--mint);color:var(--green-deep)}
  .nav .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .streak-chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:#7A5D1E;background:var(--gold-soft);border-radius:999px;padding:6px 12px}
  .avatar{width:36px;height:36px;border-radius:999px;background:var(--gold-soft);color:var(--gold);display:grid;place-items:center;font-weight:800;font-size:14px;border:1.5px solid #E8DDBE}

  .view{display:none;padding:28px 24px 48px;max-width:1080px;margin:0 auto}
  .view.active{display:block;animation:fadeUp .22s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){.view.active{animation:none}.modal,.toast{transition:none !important}}

  .h1{font-size:24px;font-weight:800;letter-spacing:-0.01em;margin:0 0 4px}
  .sub{font-size:14px;color:var(--ink-2);margin:0 0 22px;max-width:62ch}
  .sec-t{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);margin:0 0 12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px}
  .grid{display:grid;gap:14px}
  .g-2{grid-template-columns:1fr 1fr}
  .g-3{grid-template-columns:repeat(3,1fr)}
  @media (max-width:860px){.g-2,.g-3{grid-template-columns:1fr}}

  /* --- Início --- */
  .home-top{display:grid;grid-template-columns:1.35fr 1fr;gap:14px;margin-bottom:16px}
  @media (max-width:860px){.home-top{grid-template-columns:1fr}}
  .balance-card{
    background:linear-gradient(150deg,#0C6B41 0%,#0A5C38 55%,#084A2E 100%);
    color:#F2FBF6;border-radius:24px;padding:22px 22px 14px;
    box-shadow:0 14px 32px rgba(10,92,56,.25);position:relative;
  }
  .balance-card .lbl{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#A9D9BF;display:flex;align-items:center;gap:8px}
  .usdc-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;background:rgba(255,255,255,.16);border-radius:999px;padding:3px 9px;color:#DFF6E9;letter-spacing:.04em}
  .usdc-badge b{width:14px;height:14px;border-radius:999px;background:#DFF6E9;color:#0A5C38;display:inline-grid;place-items:center;font-size:9px;font-weight:900}
  .eye-btn{width:30px;height:30px;border-radius:999px;display:grid;place-items:center;background:rgba(255,255,255,.14);color:#E9F7EF;margin-left:auto}
  .eye-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .balance{font-size:36px;font-weight:800;letter-spacing:-0.02em;margin:8px 0 0;font-variant-numeric:tabular-nums}
  .balance small{font-size:16px;font-weight:700;color:#A9D9BF}
  .brl-eq{font-size:13px;color:#A9D9BF;margin:2px 0 6px;font-variant-numeric:tabular-nums}
  .delta{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;background:rgba(255,255,255,.15);border-radius:999px;padding:4px 10px;color:#CFF2DE}
  .spark-wrap{position:relative;margin-top:10px}
  .spark{display:block;width:100%;height:60px}
  .spark-tip{
    position:absolute;top:-30px;transform:translateX(-50%);pointer-events:none;opacity:0;
    background:#06331F;color:#DFF6E9;font-size:11.5px;font-weight:700;border-radius:8px;padding:3px 8px;white-space:nowrap;font-variant-numeric:tabular-nums;
  }
  .quick{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;align-content:start}
  .qbtn{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 16px;font-size:14px;font-weight:700;color:var(--ink);transition:transform .12s ease;text-align:left}
  .qbtn:active{transform:scale(.97)}
  .qbtn i{flex:none;width:42px;height:42px;border-radius:14px;background:var(--mint);display:grid;place-items:center;color:var(--green)}
  .qbtn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .qbtn small{display:block;font-size:12px;font-weight:500;color:var(--ink-3)}

  /* --- Caixinha (rendimento ao vivo) --- */
  .caixinha{
    background:linear-gradient(135deg,#F5EEDC 0%,#F1E6C8 100%);
    border:1px solid #E8DDBE;border-radius:24px;padding:20px 22px;margin-bottom:16px;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  }
  .caixinha .pig{flex:none;width:54px;height:54px;border-radius:18px;background:#FFFDF6;display:grid;place-items:center;font-size:26px;border:1px solid #E8DDBE}
  .caixinha .info{flex:1;min-width:220px}
  .caixinha .t{font-size:16px;font-weight:800;color:#4A3A14}
  .caixinha .s{font-size:12.5px;color:#7A5D1E}
  .caixinha .live{margin-left:auto;text-align:right}
  .caixinha .live-val{font-size:22px;font-weight:800;color:#4A3A14;font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
  .caixinha .live-val small{font-size:13px;color:#7A5D1E;font-weight:700}
  .live-chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;color:#0A5C38;background:#E7F2EB;border-radius:999px;padding:3px 10px;font-variant-numeric:tabular-nums}
  .live-chip .dot{width:7px;height:7px;border-radius:999px;background:#16A45E;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion: reduce){.live-chip .dot{animation:none}}
  .caixinha .btn{flex:none;background:#4A3A14;color:#F5EEDC;font-size:13px;font-weight:800;border-radius:14px;padding:11px 18px;transition:transform .12s ease}
  .caixinha .btn:active{transform:scale(.96)}

  .pote{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;transition:transform .12s ease}
  .pote:active{transform:scale(.98)}
  .pote .ic{flex:none;width:42px;height:42px;border-radius:14px;display:grid;place-items:center;font-weight:800;font-size:16px}
  .pote .nm{font-weight:700;font-size:14.5px}
  .pote .sb{font-size:12.5px;color:var(--ink-3)}
  .pote .val{margin-left:auto;text-align:right}
  .pote .val b{display:block;font-size:14.5px;font-variant-numeric:tabular-nums}
  .pote .val span{font-size:12px;font-weight:700;color:var(--green-bright)}

  .act{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .act:last-child{border-bottom:none;padding-bottom:4px}
  .act .ic{flex:none;width:36px;height:36px;border-radius:12px;background:var(--mint);color:var(--green);display:grid;place-items:center}
  .act .ic svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .act .t{font-size:14px;font-weight:600}
  .act .d{font-size:12px;color:var(--ink-3)}
  .act .v{margin-left:auto;font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;text-align:right}
  .act .v small{display:block;font-size:11px;font-weight:600;color:var(--ink-3)}
  .act .v.pos{color:var(--green)}

  /* --- Cartão --- */
  .card-stage{display:grid;grid-template-columns:400px 1fr;gap:22px;align-items:start}
  @media (max-width:860px){.card-stage{grid-template-columns:1fr}}
  .bankcard{
    aspect-ratio:1.586;border-radius:22px;padding:22px;position:relative;overflow:hidden;color:#F2FBF6;
    background:linear-gradient(135deg,#0F2419 0%,#0A5C38 60%,#0C6B41 100%);
    box-shadow:0 18px 40px rgba(10,92,56,.35);
    display:flex;flex-direction:column;justify-content:space-between;
    transition:filter .2s ease, opacity .2s ease;
  }
  .bankcard.blocked{filter:grayscale(.9);opacity:.6}
  .bankcard .row1{display:flex;align-items:center;justify-content:space-between}
  .bankcard .brand{font-size:16px;font-weight:800;letter-spacing:-0.01em}
  .bankcard .brand i{font-style:normal;color:#8FE0B4}
  .bankcard .chip{width:40px;height:30px;border-radius:6px;background:linear-gradient(135deg,#C9A356,#E6C87A);position:relative}
  .bankcard .chip::after{content:"";position:absolute;inset:6px 8px;border:1px solid rgba(74,58,20,.5);border-radius:3px}
  .bankcard .num{font-size:18px;font-weight:700;letter-spacing:.14em;font-variant-numeric:tabular-nums}
  .bankcard .row3{display:flex;align-items:flex-end;justify-content:space-between;font-size:12px}
  .bankcard .holder{text-transform:uppercase;letter-spacing:.08em;color:#CFEBD9}
  .bankcard .flag{font-size:13px;font-weight:800;color:#DFF6E9}
  .bankcard .usdc-mark{position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:999px;border:26px solid rgba(255,255,255,.06)}
  .card-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
  @media (max-width:520px){.card-actions{grid-template-columns:repeat(2,1fr)}}
  .cabtn{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--ink-2);background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 6px;transition:transform .12s ease}
  .cabtn:active{transform:scale(.95)}
  .cabtn svg{width:20px;height:20px;stroke:var(--green);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .cabtn.on svg{stroke:var(--red)}
  .cashback{display:flex;align-items:center;gap:14px;background:var(--gold-soft);border:1px solid #E8DDBE;border-radius:18px;padding:14px 16px;margin-bottom:14px}
  .cashback .coin{flex:none;width:40px;height:40px;border-radius:999px;background:#FFFDF6;border:1px solid #E8DDBE;display:grid;place-items:center;font-weight:900;color:#7A5D1E;font-size:13px}
  .cashback b{font-size:14.5px;color:#4A3A14}
  .cashback span{display:block;font-size:12.5px;color:#7A5D1E}

  /* --- Investir --- */
  .plan{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;transition:transform .12s ease;display:flex;flex-direction:column;gap:10px}
  .plan:active{transform:scale(.98)}
  .plan .top{display:flex;align-items:center;gap:12px}
  .plan .badge{margin-left:auto;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-radius:999px;padding:4px 10px}

<script>
(function(){
  'use strict';
  var nf2 = new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  var nf0 = new Intl.NumberFormat('pt-BR',{maximumFractionDigits:0});
  var nf6 = new Intl.NumberFormat('pt-BR',{minimumFractionDigits:6,maximumFractionDigits:6});

  /* ---------- navegação ---------- */
  var links = document.querySelectorAll('.navlink');
  var views = document.querySelectorAll('.view');
  function goto(name){
    links.forEach(function(t){t.classList.toggle('active', t.dataset.view===name);});
    views.forEach(function(v){v.classList.toggle('active', v.id==='view-'+name);});
  }
  links.forEach(function(t){t.addEventListener('click',function(){goto(t.dataset.view);});});
  document.querySelectorAll('[data-goto]').forEach(function(b){
    b.addEventListener('click',function(){goto(b.dataset.goto);});
  });

  /* ---------- toast ---------- */
  var toast = document.getElementById('toast'); var toastTimer;
  function showToast(msg){
    toast.textContent = msg; toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){toast.classList.remove('show');},2400);
  }
  document.querySelectorAll('[data-toast]').forEach(function(b){
    b.addEventListener('click',function(){showToast(b.dataset.toast);});
  });

  /* ---------- esconder saldo ---------- */
  var hidden=false, stored=[];
  var balanceValue=document.getElementById('balanceValue');
  var brlEq=document.getElementById('brlEq');
  var deltaChip=document.getElementById('deltaChip');
  var eyeBtn=document.getElementById('eyeBtn');
  function moneyEls(){return document.querySelectorAll('.money');}
  eyeBtn.addEventListener('click',function(){
    hidden=!hidden;
    eyeBtn.setAttribute('aria-pressed',String(hidden));
    if(hidden){
      balanceValue.innerHTML='•••••• <small>USDC</small>';
      brlEq.textContent='≈ R$ ••••••';
      deltaChip.textContent='▲ + •••• hoje';
      stored=[];
      moneyEls().forEach(function(el){stored.push(el.innerHTML); el.textContent='••••';});
    }else{
      balanceValue.innerHTML='2.415,80 <small>USDC</small>';
      brlEq.textContent='≈ R$ 12.852,05';
      deltaChip.textContent='▲ + 2,41 USDC hoje';
      moneyEls().forEach(function(el,i){ if(stored[i]!==undefined) el.innerHTML=stored[i]; });
    }
  });

  /* ---------- Caixinha ao vivo (8% a.a. sobre 320,45 USDC) ---------- */
  var caixinhaBase=320.45;
  var perSecond=caixinhaBase*0.08/365/24/3600; /* ≈ 0,0000008 USDC/s */
  var start=Date.now();
  var caixinhaEl=document.getElementById('caixinhaVal');
  var caixinhaHoje=document.getElementById('caixinhaHoje');
  var hojeBase=0.058;
  setInterval(function(){
    var t=(Date.now()-start)/1000;
    caixinhaEl.textContent=nf6.format(caixinhaBase + perSecond*t);
    caixinhaHoje.textContent=nf2.format(hojeBase + perSecond*t).replace('.',',');
  },120);

  /* ---------- gráficos ---------- */
  var heroData=[], v=2274;
  for(var i=0;i<30;i++){
    v += 3.4 + Math.sin(i/3.1)*4.9 + (i%7===0? -6.4: 1.5);
    heroData.push(Math.round(v*100)/100);
  }
  heroData[29]=2415.80;

  function buildLine(svg, data, opts){
    var vb=svg.viewBox.baseVal, W=vb.width, H=vb.height;
    var pad=opts.pad||6;
    var min=Math.min.apply(null,data), max=Math.max.apply(null,data);
    var span=(max-min)||1;
    var pts=data.map(function(d,i){
      return [pad + i*(W-2*pad)/(data.length-1), H-pad-((d-min)/span)*(H-2*pad-(opts.top||8))];
    });
    var line=pts.map(function(p,i){return (i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
    var area=line+' L'+pts[pts.length-1][0].toFixed(1)+','+H+' L'+pts[0][0].toFixed(1)+','+H+' Z';
    var ns='http://www.w3.org/2000/svg';
    if(opts.grid){
      for(var g=1;g<=3;g++){
        var gl=document.createElementNS(ns,'line');
        var gy=pad+g*(H-2*pad)/4;
        gl.setAttribute('x1',pad);gl.setAttribute('x2',W-pad);gl.setAttribute('y1',gy);gl.setAttribute('y2',gy);
        gl.setAttribute('stroke',opts.gridColor);gl.setAttribute('stroke-width','1');
        svg.appendChild(gl);
      }
    }
    var a=document.createElementNS(ns,'path');
    a.setAttribute('d',area); a.setAttribute('fill',opts.fill);
    svg.appendChild(a);
    var l=document.createElementNS(ns,'path');
    l.setAttribute('d',line); l.setAttribute('fill','none');
    l.setAttribute('stroke',opts.stroke); l.setAttribute('stroke-width',opts.width||2);
    l.setAttribute('stroke-linecap','round'); l.setAttribute('stroke-linejoin','round');
    svg.appendChild(l);
    var end=document.createElementNS(ns,'circle');
    end.setAttribute('cx',pts[pts.length-1][0]); end.setAttribute('cy',pts[pts.length-1][1]);
    end.setAttribute('r',3.6); end.setAttribute('fill',opts.dot);
    svg.appendChild(end);
    var cursor=document.createElementNS(ns,'circle');
    cursor.setAttribute('r',4); cursor.setAttribute('fill',opts.dot); cursor.setAttribute('opacity','0');
    svg.appendChild(cursor);
    var vline=document.createElementNS(ns,'line');
    vline.setAttribute('stroke',opts.stroke); vline.setAttribute('stroke-width','1');
    vline.setAttribute('stroke-dasharray','3 3'); vline.setAttribute('opacity','0');
    vline.setAttribute('y1',pad); vline.setAttribute('y2',H-pad);
    svg.appendChild(vline);
    return {pts:pts, cursor:cursor, vline:vline, W:W, H:H};
  }

  function nearestIdx(built, svg, ev){
    var r=svg.getBoundingClientRect();
    var x=(ev.clientX-r.left)/r.width*built.W;
    var idx=0,best=1e9;
    built.pts.forEach(function(p,i){var d=Math.abs(p[0]-x); if(d<best){best=d;idx=i;}});
    return idx;
  }

  var heroSvg=document.getElementById('heroSpark');
  var heroTip=document.getElementById('heroTip');
  var heroBuilt=buildLine(heroSvg,heroData,{fill:'rgba(255,255,255,.10)',stroke:'#8FE0B4',dot:'#C9F5DC',pad:6,width:2});
  heroSvg.addEventListener('pointermove',function(ev){
    var idx=nearestIdx(heroBuilt,heroSvg,ev);
    var p=heroBuilt.pts[idx];
    heroBuilt.cursor.setAttribute('cx',p[0]); heroBuilt.cursor.setAttribute('cy',p[1]); heroBuilt.cursor.setAttribute('opacity','1');
    heroBuilt.vline.setAttribute('x1',p[0]); heroBuilt.vline.setAttribute('x2',p[0]); heroBuilt.vline.setAttribute('opacity','.5');
    heroTip.style.opacity='1';
    heroTip.style.left=(p[0]/heroBuilt.W*100)+'%';
    var daysAgo=29-idx;
    heroTip.textContent=(daysAgo===0?'hoje':daysAgo+'d atrás')+' · '+nf2.format(heroData[idx])+' USDC';
  });
  heroSvg.addEventListener('pointerleave',function(){
    heroBuilt.cursor.setAttribute('opacity','0'); heroBuilt.vline.setAttribute('opacity','0'); heroTip.style.opacity='0';
  });

  var evoData=[2144,2165,2192,2223,2255,2283,2306,2329,2349,2372,2394,2415.80];
  var evoLabels=['fev','fev','mar','mar','abr','abr','mai','mai','jun','jun','jul','jul'];
  var evoSvg=document.getElementById('evoChart');
  var evoTip=document.getElementById('evoTip');
  var evoBuilt=buildLine(evoSvg,evoData,{fill:'rgba(14,122,74,.10)',stroke:'#0E7A4A',dot:'#0A5C38',pad:10,width:2.5,grid:true,gridColor:'#EFEFE8',top:16});
  evoSvg.addEventListener('pointermove',function(ev){
    var idx=nearestIdx(evoBuilt,evoSvg,ev);
    var p=evoBuilt.pts[idx];
    evoBuilt.cursor.setAttribute('cx',p[0]); evoBuilt.cursor.setAttribute('cy',p[1]); evoBuilt.cursor.setAttribute('opacity','1');
    evoBuilt.vline.setAttribute('x1',p[0]); evoBuilt.vline.setAttribute('x2',p[0]); evoBuilt.vline.setAttribute('opacity','.5');
    var card=evoSvg.parentElement;
    var cr=card.getBoundingClientRect(), sr=evoSvg.getBoundingClientRect();
    evoTip.style.opacity='1';
    evoTip.style.left=(sr.left-cr.left + p[0]/evoBuilt.W*sr.width)+'px';
    evoTip.style.top=(sr.top-cr.top + p[1]/evoBuilt.H*sr.height)+'px';
    evoTip.textContent=evoLabels[idx]+' · '+nf2.format(evoData[idx])+' USDC';
  });
  evoSvg.addEventListener('pointerleave',function(){
    evoBuilt.cursor.setAttribute('opacity','0'); evoBuilt.vline.setAttribute('opacity','0'); evoTip.style.opacity='0';
  });

  /* ---------- cartão ---------- */
  var bankcard=document.getElementById('bankcard');
  var blockBtn=document.getElementById('blockBtn');
  var blockLbl=document.getElementById('blockLbl');
  var blocked=false;
  blockBtn.addEventListener('click',function(){
    blocked=!blocked;
    bankcard.classList.toggle('blocked',blocked);
    blockBtn.setAttribute('aria-pressed',String(blocked));
    blockBtn.classList.toggle('on',blocked);
    blockLbl.textContent=blocked?'Desbloquear':'Bloquear';
    showToast(blocked?'Cartão bloqueado. Ninguém compra nada 🔒':'Cartão desbloqueado. Tudo certo de novo ✅');
  });
  var cardNum=document.getElementById('cardNum');
  var showDataBtn=document.getElementById('showDataBtn');
  var showingNum=false;
  showDataBtn.addEventListener('click',function(){
    showingNum=!showingNum;
    showDataBtn.setAttribute('aria-pressed',String(showingNum));
    cardNum.textContent=showingNum?'5312 9004 1187 4519':'5312 •••• •••• 4519';
    if(showingNum) showToast('Número visível — dados fictícios de demonstração 🙂');
  });

  /* ---------- planos / modal ---------- */
  var PLANS={
    safe:{
      name:'Guardar com Segurança', tagline:'Estável e protegido',
      desc:'O jeito mais simples de começar. Seu USDC fica em reservas estáveis, rendendo um pouco todo ano — quase sem sobe-e-desce. Ótimo para quem não quer surpresa.',
      apy:'4–7%', min:'20 USDC', move:'Quase nada', cta:'Começar com 20 USDC',
      alloc:[{n:'Reservas estáveis em USDC',p:80,c:'#0E7A4A'},{n:'Estratégias de rendimento',p:15,c:'#A07C2C'},{n:'Reserva de caixa',p:5,c:'#B0563A'}]
    },
    steady:{
      name:'Crescer com Calma', tagline:'Crescimento equilibrado',
      desc:'Uma mistura equilibrada, feita para crescer com o tempo balançando só um pouco no caminho. A escolha do meio, boa para a maioria das pessoas.',
      apy:'9–16%', min:'100 USDC', move:'Um pouco', cta:'Começar com 100 USDC',
      alloc:[{n:'Reservas estáveis em USDC',p:50,c:'#0E7A4A'},{n:'Estratégias de rendimento',p:40,c:'#A07C2C'},{n:'Reserva de caixa',p:10,c:'#B0563A'}]
    },
    fast:{
      name:'Crescer Mais Rápido', tagline:'Mais crescimento, mais sobe-e-desce',
      desc:'Busca o maior crescimento no longo prazo. Espere subidas e descidas maiores — melhor para dinheiro que você não vai precisar tão cedo.',
      apy:'20–45%', min:'400 USDC', move:'Bastante', cta:'Começar com 400 USDC',
      alloc:[{n:'Reservas estáveis em USDC',p:20,c:'#0E7A4A'},{n:'Estratégias de rendimento',p:70,c:'#A07C2C'},{n:'Reserva de caixa',p:10,c:'#B0563A'}]
    }
  };
  var modal=document.getElementById('planModal'), backdrop=document.getElementById('modalBackdrop');
  function openPlan(id){
    var p=PLANS[id]; if(!p) return;
    document.getElementById('sheetTitle').textContent=p.name;
    document.getElementById('sheetTagline').textContent=p.tagline;
    document.getElementById('sheetDesc').textContent=p.desc;
    document.getElementById('sheetApy').textContent=p.apy;
    document.getElementById('sheetMin').textContent=p.min;
    document.getElementById('sheetMove').textContent=p.move;
    document.getElementById('sheetCta').textContent=p.cta;
    var bar=document.getElementById('allocBar'), leg=document.getElementById('allocLeg');
    bar.innerHTML=''; leg.innerHTML='';
    p.alloc.forEach(function(a){
      var seg=document.createElement('i');
      seg.style.width=a.p+'%'; seg.style.background=a.c; bar.appendChild(seg);
      var li=document.createElement('div'); li.className='li';
      var dot=document.createElement('i'); dot.style.background=a.c;
      var nm=document.createElement('span'); nm.textContent=a.n;
      var pv=document.createElement('b'); pv.textContent=a.p+'%';
      li.appendChild(dot); li.appendChild(nm); li.appendChild(pv); leg.appendChild(li);
    });
    modal.classList.add('open'); backdrop.classList.add('open');
  }
  function closePlan(){modal.classList.remove('open');backdrop.classList.remove('open');}
  document.querySelectorAll('[data-open-plan]').forEach(function(b){
    b.addEventListener('click',function(){openPlan(b.dataset.openPlan);});
  });
  backdrop.addEventListener('click',closePlan);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closePlan();});
  document.getElementById('sheetCta').addEventListener('click',function(){
    closePlan(); showToast('Boa escolha! 🎉 (isso é um protótipo)');
  });

  /* ---------- simulador ---------- */
  var simRange=document.getElementById('simRange');
  var simAmount=document.getElementById('simAmount');
  var simResult=document.getElementById('simResult');
  var months=12;
  function project(P,rate,m){return P*Math.pow(1+rate/100,m/12);}
  function renderSim(){
    var P=Number(simRange.value);
    simAmount.textContent=nf0.format(P);
    simResult.textContent=nf0.format(Math.round(project(P,9,months)))+' e '+nf0.format(Math.round(project(P,16,months)))+' USDC';
  }
  simRange.addEventListener('input',renderSim);
  document.querySelectorAll('#simPeriods .chip').forEach(function(ch){
    ch.addEventListener('click',function(){
      document.querySelectorAll('#simPeriods .chip').forEach(function(c){c.classList.remove('on');});
      ch.classList.add('on'); months=Number(ch.dataset.months); renderSim();
    });
  });
  renderSim();

  /* ---------- assistente ---------- */
  var ANSWERS={
    'O que é USDC?':'USDC é uma moeda digital que vale sempre 1 dólar americano. É como ter dólares no bolso, só que no celular — e aqui eles ainda rendem todo dia 🙂',
    'Quanto rendeu este mês?':'Este mês seu dinheiro rendeu 6,41 USDC até agora 📈 — somando os potes, a Caixinha e o cashback do cartão. Quer ver o detalhe de cada um?',
    'Meu dinheiro está seguro?':'Sim! Seu saldo fica em USDC, que vale sempre 1 dólar, e a maior parte fica em reservas estáveis. Você resgata quando quiser, sem multa. Nós cuidamos da parte complicada 🙂',
    'Posso resgatar quando quiser?':'Pode! É só tocar em "Resgatar" na tela de Início. O USDC vira Pix na sua conta em segundos, sem multa e sem pegadinha.'
  };
  var msgs=document.getElementById('msgs');
  var suggestions=document.getElementById('suggestions');
  function addMsg(text,who){
    var d=document.createElement('div'); d.className='msg '+who; d.textContent=text;
    msgs.appendChild(d); return d;
  }
  function botReply(text){
    var t=document.createElement('div'); t.className='msg bot typing';
    t.innerHTML='<i></i><i></i><i></i>';
    msgs.appendChild(t);
    setTimeout(function(){ t.remove(); addMsg(text,'bot'); },900);
  }
  function ask(q){
    addMsg(q,'user');
    botReply(ANSWERS[q] || 'Boa pergunta! No app de verdade eu respondo qualquer coisa na hora. Aqui na demo, experimente os botões de sugestão 🙂');
  }
  suggestions.addEventListener('click',function(e){
    var b=e.target.closest('[data-q]'); if(!b) return;
    suggestions.remove(); ask(b.dataset.q);
  });
  document.getElementById('chatForm').addEventListener('submit',function(e){
    e.preventDefault();
    var inp=document.getElementById('chatInput');
    var q=inp.value.trim(); if(!q) return;
    inp.value=''; ask(q);
  });

  /* ==================== FUNIL: LOGIN / CADASTRO / PERFIL ==================== */
  var auth=document.getElementById('auth');
  var ascreens=document.querySelectorAll('.ascreen');
  var userName='João';
  function aGoto(name){
    ascreens.forEach(function(s){s.classList.toggle('active', s.id==='a-'+name);});
  }
  document.querySelectorAll('[data-a]').forEach(function(b){
    b.addEventListener('click',function(){aGoto(b.dataset.a);});
  });

  function firstName(full){
    var n=(full||'').trim().split(/\s+/)[0];
    if(!n) return 'João';
    return n.charAt(0).toUpperCase()+n.slice(1);
  }
  function finishAuth(){
    document.getElementById('helloName').textContent=userName;
    document.getElementById('avatarBtn').textContent=userName.charAt(0).toUpperCase();
    auth.classList.add('hide');
    setTimeout(function(){auth.style.display='none';},400);
  }

  /* login: qualquer e-mail/senha entra (demo) */
  document.getElementById('loginForm').addEventListener('submit',function(e){
    e.preventDefault();
    var em=document.getElementById('loginEmail').value.trim();
    var pw=document.getElementById('loginPass').value;
    if(!em || !pw){ showToast('Preencha e-mail e senha para entrar 🙂'); return; }
    userName='João';
    finishAuth();
    showToast('Bem-vindo de volta! 👋');
  });

  /* cadastro */
  document.getElementById('signupForm').addEventListener('submit',function(e){
    e.preventDefault();
    var nm=document.getElementById('suName').value.trim();
    var em=document.getElementById('suEmail').value.trim();
    var pw=document.getElementById('suPass').value;
    if(!nm){ showToast('Conta pra gente: como você se chama? 🙂'); return; }
    if(em.indexOf('@')<0){ showToast('Esse e-mail não parece completo — falta o @'); return; }
    if(pw.length<8){ showToast('A senha precisa de pelo menos 8 caracteres 🔒'); return; }
    if(!document.getElementById('suTerms').checked){ showToast('Falta aceitar os termos para continuar'); return; }
    userName=firstName(nm);
    startProfile();
    aGoto('profile');
  });

  /* perfil de investidor: 3 perguntas simples */
  var QUESTIONS=[
    { q:'O que você quer para o seu dinheiro?',
      opts:[
        {em:'🛡️', t:'Guardar com segurança', s:'Sem sustos, rendendo aos poucos', v:1},
        {em:'⚖️', t:'Crescer com calma', s:'Um equilíbrio entre segurança e crescimento', v:2},
        {em:'🚀', t:'Crescer o máximo', s:'Aceito mais risco para render mais', v:3}
      ]},
    { q:'Você já investiu antes?',
      opts:[
        {em:'🌱', t:'Nunca', s:'Vai ser minha primeira vez', v:1},
        {em:'📗', t:'Um pouco', s:'Poupança, CDB ou parecido', v:2},
        {em:'📈', t:'Sim, bastante', s:'Já conheço o mercado', v:3}
      ]},
    { q:'Se seu saldo balançar por uns meses, você…',
      opts:[
        {em:'😟', t:'Prefiro que não balance', s:'Quero ver só subir', v:1},
        {em:'🙂', t:'Aguento um pouco', s:'Desde que cresça no fim', v:2},
        {em:'😎', t:'Tranquilo, faz parte', s:'Penso no longo prazo', v:3}
      ]}
  ];
  var qIdx=0, score=0;
  var PROFILES={
    calm:{name:'Tranquilo', pote:'Guardar com Segurança'},
    mid:{name:'Equilibrado', pote:'Crescer com Calma'},
    bold:{name:'Confiante', pote:'Crescer Mais Rápido'}
  };
  function startProfile(){ qIdx=0; score=0; renderQuestion(); }
  function renderQuestion(){
    var Q=QUESTIONS[qIdx];
    document.getElementById('aStepLbl').textContent='Pergunta '+(qIdx+1)+' de '+QUESTIONS.length;
    document.getElementById('aProgFill').style.width=((qIdx+1)/QUESTIONS.length*100)+'%';
    document.getElementById('aQ').textContent=Q.q;
    var box=document.getElementById('aOpts'); box.innerHTML='';
    Q.opts.forEach(function(o){
      var b=document.createElement('button');
      var em=document.createElement('span'); em.className='em'; em.textContent=o.em;
      var tx=document.createElement('span'); tx.textContent=o.t;
      var sm=document.createElement('small'); sm.textContent=o.s;
      tx.appendChild(sm);
      b.appendChild(em); b.appendChild(tx);
      b.addEventListener('click',function(){
        score+=o.v; qIdx++;
        if(qIdx<QUESTIONS.length){ renderQuestion(); }
        else{ aGoto('creating'); runCreation(); }
      });
      box.appendChild(b);
    });
  }

  /* criação da conta — a wallet (Dynamic) nasce invisível aqui */
  function runCreation(){
    ['ck1','ck2','ck3'].forEach(function(id){document.getElementById(id).classList.remove('done');});
    setTimeout(function(){document.getElementById('ck1').classList.add('done');},700);
    setTimeout(function(){document.getElementById('ck2').classList.add('done');},1500);
    setTimeout(function(){document.getElementById('ck3').classList.add('done');},2300);
    setTimeout(function(){
      var p = score<=4 ? PROFILES.calm : (score<=7 ? PROFILES.mid : PROFILES.bold);
      document.getElementById('aDoneTitle').textContent='Tudo pronto, '+userName+'!';
      document.getElementById('aDoneText').innerHTML='Seu perfil de investidor é <b>'+p.name+'</b> — recomendamos começar pelo pote <b>'+p.pote+'</b>. Sua conta já aceita Pix e rende em USDC.';
      aGoto('done');
    },3100);
  }
  document.getElementById('aEnter').addEventListener('click',finishAuth);

  /* sair (demo): avatar reabre o funil */
  document.getElementById('avatarBtn').addEventListener('click',function(){
    auth.style.display='flex';
    setTimeout(function(){auth.classList.remove('hide');},30);
    aGoto('welcome');
    showToast('Você saiu da conta (demo) 👋');
  });
})();
</script>

</template>

<template id="tpl-mobile">
<title>DefiMind — Demo Celular</title>
<style>
  /* ============ TOKENS — página externa (tema claro/escuro) ============ */
  :root{
    --pg-bg:#EFEEE9; --pg-ink:#131A16; --pg-ink-2:#4C564F; --pg-ink-3:#7A847D; --pg-border:#DDDCD4; --pg-green:#0E7A4A;
  }
  @media (prefers-color-scheme: dark){
    :root{--pg-bg:#0B0F0D;--pg-ink:#EDF1EE;--pg-ink-2:#ADB8B0;--pg-ink-3:#77837B;--pg-border:#242D27;--pg-green:#2FB673}
  }
  :root[data-theme="dark"]{--pg-bg:#0B0F0D;--pg-ink:#EDF1EE;--pg-ink-2:#ADB8B0;--pg-ink-3:#77837B;--pg-border:#242D27;--pg-green:#2FB673}
  :root[data-theme="light"]{--pg-bg:#EFEEE9;--pg-ink:#131A16;--pg-ink-2:#4C564F;--pg-ink-3:#7A847D;--pg-border:#DDDCD4;--pg-green:#0E7A4A}

  /* ============ TOKENS — o app (tema fixo) ============ */
  :root{
    --bg:#F8F8F5; --card:#FFFFFF; --ink:#121814; --ink-2:#525C55; --ink-3:#8A948C; --line:#E9E9E2;
    --green:#0E7A4A; --green-deep:#0A5C38; --green-bright:#16A45E; --mint:#E7F2EB;
    --gold:#A07C2C; --gold-soft:#F5EEDC; --rust:#B0563A; --rust-soft:#F7E8E2; --red:#C03A2B;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--pg-bg);color:var(--pg-ink);
    font-family:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0;font-size:inherit}
  button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:6px}

  .wrap{max-width:640px;margin:0 auto;padding:26px 16px 56px;display:flex;flex-direction:column;align-items:center}
  .intro{width:100%;display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .wordmark{font-size:18px;font-weight:800;letter-spacing:-0.02em}
  .wordmark i{font-style:normal;color:var(--pg-green)}
  .intro small{font-size:12.5px;color:var(--pg-ink-3)}
  .foot{text-align:center;font-size:12px;color:var(--pg-ink-3);margin-top:18px;max-width:44ch}

  /* ============ O CELULAR ============ */
  .phone{
    width:390px;flex:none;
    background:#0B0E0C;border-radius:54px;padding:12px;
    box-shadow:0 30px 80px rgba(10,20,14,.35), 0 4px 16px rgba(10,20,14,.18);
  }
  @media (max-width:430px){.phone{width:100%;border-radius:40px;padding:8px}}
  .screen{
    height:790px;border-radius:44px;overflow:hidden;position:relative;
    background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;font-size:15px;
  }
  @media (max-width:430px){.screen{border-radius:34px;height:78vh;min-height:600px}}
  .notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:28px;background:#0B0E0C;border-radius:999px;z-index:40}
  .statusbar{flex:none;height:46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 4px;font-size:13px;font-weight:600}

  .views{flex:1;position:relative;overflow:hidden}
  .view{
    position:absolute;inset:0;overflow-y:auto;overscroll-behavior:contain;
    padding:8px 18px 96px;
    opacity:0;transform:translateY(8px);pointer-events:none;
    transition:opacity .22s ease, transform .22s ease;
  }
  .view.active{opacity:1;transform:none;pointer-events:auto}
  .view::-webkit-scrollbar{display:none}
  @media (prefers-reduced-motion: reduce){.view{transition:none}.sheet,.toast{transition:none !important}}

  /* ============ NAV INFERIOR ============ */
  .tabbar{
    position:absolute;bottom:0;left:0;right:0;z-index:30;
    display:flex;justify-content:space-around;align-items:center;
    padding:8px 6px 16px;
    background:color-mix(in srgb, var(--card) 94%, transparent);
    backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
  }
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--ink-3);padding:6px 9px;border-radius:14px}
  .tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--green);background:var(--mint)}

  /* ============ COMPONENTES ============ */
  .app-h{display:flex;align-items:center;justify-content:space-between;margin:6px 0 14px}
  .hello{font-size:19px;font-weight:700;letter-spacing:-0.01em}
  .hello small{display:block;font-size:12px;font-weight:500;color:var(--ink-3)}
  .h-right{display:flex;align-items:center;gap:8px}
  .streak-chip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;color:#7A5D1E;background:var(--gold-soft);border-radius:999px;padding:5px 10px}
  .avatar{width:38px;height:38px;border-radius:999px;background:var(--gold-soft);color:var(--gold);display:grid;place-items:center;font-weight:800;font-size:14px;border:1.5px solid #E8DDBE}

  .page-t{font-size:20px;font-weight:800;letter-spacing:-0.01em;margin:6px 0 4px}

  .sec-t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);margin:0 0 10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px}
  .stack{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}

  /* --- saldo --- */
  .balance-card{
    background:linear-gradient(150deg,#0C6B41 0%,#0A5C38 55%,#084A2E 100%);
    color:#F2FBF6;border-radius:24px;padding:18px 18px 12px;
    box-shadow:0 12px 28px rgba(10,92,56,.28);
  }
  .balance-card .lbl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#A9D9BF;display:flex;align-items:center;gap:7px}
  .usdc-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;background:rgba(255,255,255,.16);border-radius:999px;padding:2px 8px;color:#DFF6E9;letter-spacing:.04em}
  .usdc-badge b{width:13px;height:13px;border-radius:999px;background:#DFF6E9;color:#0A5C38;display:inline-grid;place-items:center;font-size:8px;font-weight:900}
  .eye-btn{width:28px;height:28px;border-radius:999px;display:grid;place-items:center;background:rgba(255,255,255,.14);color:#E9F7EF;margin-left:auto}

  <p class="foot">Protótipo interativo do DefiMind — valores ilustrativos para demonstração. 1 USDC = 1 dólar americano.</p>
</div>

<script>
(function(){
  'use strict';
  var nf2 = new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  var nf0 = new Intl.NumberFormat('pt-BR',{maximumFractionDigits:0});
  var nf6 = new Intl.NumberFormat('pt-BR',{minimumFractionDigits:6,maximumFractionDigits:6});

  /* ---------- navegação ---------- */
  var tabs = document.querySelectorAll('.tab');
  var views = document.querySelectorAll('.view');
  function goto(name){
    tabs.forEach(function(t){t.classList.toggle('active', t.dataset.view===name);});
    views.forEach(function(v){v.classList.toggle('active', v.id==='view-'+name);});
  }
  tabs.forEach(function(t){t.addEventListener('click',function(){goto(t.dataset.view);});});
  document.querySelectorAll('[data-goto]').forEach(function(b){
    b.addEventListener('click',function(){goto(b.dataset.goto);});
  });

  /* ---------- toast ---------- */
  var toast = document.getElementById('toast'); var toastTimer;
  function showToast(msg){
    toast.textContent = msg; toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){toast.classList.remove('show');},2400);
  }
  document.querySelectorAll('[data-toast]').forEach(function(b){
    b.addEventListener('click',function(){showToast(b.dataset.toast);});
  });

  /* ---------- esconder saldo ---------- */
  var hidden=false, stored=[];
  var balanceValue=document.getElementById('balanceValue');
  var brlEq=document.getElementById('brlEq');
  var deltaChip=document.getElementById('deltaChip');
  var eyeBtn=document.getElementById('eyeBtn');
  function moneyEls(){return document.querySelectorAll('.money');}
  eyeBtn.addEventListener('click',function(){
    hidden=!hidden;
    eyeBtn.setAttribute('aria-pressed',String(hidden));
    if(hidden){
      balanceValue.innerHTML='•••••• <small>USDC</small>';
      brlEq.textContent='≈ R$ ••••••';
      deltaChip.textContent='▲ + •••• hoje';
      stored=[];
      moneyEls().forEach(function(el){stored.push(el.innerHTML); el.textContent='••••';});
    }else{
      balanceValue.innerHTML='2.415,80 <small>USDC</small>';
      brlEq.textContent='≈ R$ 12.852,05';
      deltaChip.textContent='▲ + 2,41 USDC hoje';
      moneyEls().forEach(function(el,i){ if(stored[i]!==undefined) el.innerHTML=stored[i]; });
    }
  });

  /* ---------- Caixinha ao vivo ---------- */
  var caixinhaBase=320.45;
  var perSecond=caixinhaBase*0.08/365/24/3600;
  var start=Date.now();
  var caixinhaEl=document.getElementById('caixinhaVal');
  var caixinhaHoje=document.getElementById('caixinhaHoje');
  var hojeBase=0.058;
  setInterval(function(){
    var t=(Date.now()-start)/1000;
    caixinhaEl.textContent=nf6.format(caixinhaBase + perSecond*t);
    caixinhaHoje.textContent=nf2.format(hojeBase + perSecond*t);
  },120);

  /* ---------- gráficos ---------- */
  var heroData=[], v=2274;
  for(var i=0;i<30;i++){
    v += 3.4 + Math.sin(i/3.1)*4.9 + (i%7===0? -6.4: 1.5);
    heroData.push(Math.round(v*100)/100);
  }
  heroData[29]=2415.80;

  function buildLine(svg, data, opts){
    var vb=svg.viewBox.baseVal, W=vb.width, H=vb.height;
    var pad=opts.pad||6;
    var min=Math.min.apply(null,data), max=Math.max.apply(null,data);
    var span=(max-min)||1;
    var pts=data.map(function(d,i){
      return [pad + i*(W-2*pad)/(data.length-1), H-pad-((d-min)/span)*(H-2*pad-(opts.top||8))];
    });
    var line=pts.map(function(p,i){return (i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
    var area=line+' L'+pts[pts.length-1][0].toFixed(1)+','+H+' L'+pts[0][0].toFixed(1)+','+H+' Z';
    var ns='http://www.w3.org/2000/svg';
    if(opts.grid){
      for(var g=1;g<=3;g++){
        var gl=document.createElementNS(ns,'line');
        var gy=pad+g*(H-2*pad)/4;
        gl.setAttribute('x1',pad);gl.setAttribute('x2',W-pad);gl.setAttribute('y1',gy);gl.setAttribute('y2',gy);
        gl.setAttribute('stroke',opts.gridColor);gl.setAttribute('stroke-width','1');
        svg.appendChild(gl);
      }
    }
    var a=document.createElementNS(ns,'path');
    a.setAttribute('d',area); a.setAttribute('fill',opts.fill);
    svg.appendChild(a);
    var l=document.createElementNS(ns,'path');
    l.setAttribute('d',line); l.setAttribute('fill','none');
    l.setAttribute('stroke',opts.stroke); l.setAttribute('stroke-width',opts.width||2);
    l.setAttribute('stroke-linecap','round'); l.setAttribute('stroke-linejoin','round');
    svg.appendChild(l);
    var end=document.createElementNS(ns,'circle');
    end.setAttribute('cx',pts[pts.length-1][0]); end.setAttribute('cy',pts[pts.length-1][1]);
    end.setAttribute('r',3.4); end.setAttribute('fill',opts.dot);
    svg.appendChild(end);
    var cursor=document.createElementNS(ns,'circle');
    cursor.setAttribute('r',4); cursor.setAttribute('fill',opts.dot); cursor.setAttribute('opacity','0');
    svg.appendChild(cursor);
    var vline=document.createElementNS(ns,'line');
    vline.setAttribute('stroke',opts.stroke); vline.setAttribute('stroke-width','1');
    vline.setAttribute('stroke-dasharray','3 3'); vline.setAttribute('opacity','0');
    vline.setAttribute('y1',pad); vline.setAttribute('y2',H-pad);
    svg.appendChild(vline);
    return {pts:pts, cursor:cursor, vline:vline, W:W, H:H};
  }

  function nearestIdx(built, svg, ev){
    var r=svg.getBoundingClientRect();
    var x=(ev.clientX-r.left)/r.width*built.W;
    var idx=0,best=1e9;
    built.pts.forEach(function(p,i){var d=Math.abs(p[0]-x); if(d<best){best=d;idx=i;}});
    return idx;
  }

  var heroSvg=document.getElementById('heroSpark');
  var heroTip=document.getElementById('heroTip');
  var heroBuilt=buildLine(heroSvg,heroData,{fill:'rgba(255,255,255,.10)',stroke:'#8FE0B4',dot:'#C9F5DC',pad:6,width:2});
  heroSvg.addEventListener('pointermove',function(ev){
    var idx=nearestIdx(heroBuilt,heroSvg,ev);
    var p=heroBuilt.pts[idx];
    heroBuilt.cursor.setAttribute('cx',p[0]); heroBuilt.cursor.setAttribute('cy',p[1]); heroBuilt.cursor.setAttribute('opacity','1');
    heroBuilt.vline.setAttribute('x1',p[0]); heroBuilt.vline.setAttribute('x2',p[0]); heroBuilt.vline.setAttribute('opacity','.5');
    heroTip.style.opacity='1';
    heroTip.style.left=(p[0]/heroBuilt.W*100)+'%';
    var daysAgo=29-idx;
    heroTip.textContent=(daysAgo===0?'hoje':daysAgo+'d atrás')+' · '+nf2.format(heroData[idx])+' USDC';
  });
  heroSvg.addEventListener('pointerleave',function(){
    heroBuilt.cursor.setAttribute('opacity','0'); heroBuilt.vline.setAttribute('opacity','0'); heroTip.style.opacity='0';
  });

  var evoData=[2144,2165,2192,2223,2255,2283,2306,2329,2349,2372,2394,2415.80];
  var evoLabels=['fev','fev','mar','mar','abr','abr','mai','mai','jun','jun','jul','jul'];
  var evoSvg=document.getElementById('evoChart');
  var evoTip=document.getElementById('evoTip');
  var evoBuilt=buildLine(evoSvg,evoData,{fill:'rgba(14,122,74,.10)',stroke:'#0E7A4A',dot:'#0A5C38',pad:8,width:2.2,grid:true,gridColor:'#EFEFE8',top:12});
  evoSvg.addEventListener('pointermove',function(ev){
    var idx=nearestIdx(evoBuilt,evoSvg,ev);
    var p=evoBuilt.pts[idx];
    evoBuilt.cursor.setAttribute('cx',p[0]); evoBuilt.cursor.setAttribute('cy',p[1]); evoBuilt.cursor.setAttribute('opacity','1');
    evoBuilt.vline.setAttribute('x1',p[0]); evoBuilt.vline.setAttribute('x2',p[0]); evoBuilt.vline.setAttribute('opacity','.5');
    var card=evoSvg.parentElement;
    var cr=card.getBoundingClientRect(), sr=evoSvg.getBoundingClientRect();
    evoTip.style.opacity='1';
    evoTip.style.left=(sr.left-cr.left + p[0]/evoBuilt.W*sr.width)+'px';
    evoTip.style.top=(sr.top-cr.top + p[1]/evoBuilt.H*sr.height)+'px';
    evoTip.textContent=evoLabels[idx]+' · '+nf2.format(evoData[idx])+' USDC';
  });
  evoSvg.addEventListener('pointerleave',function(){
    evoBuilt.cursor.setAttribute('opacity','0'); evoBuilt.vline.setAttribute('opacity','0'); evoTip.style.opacity='0';
  });

  /* ---------- cartão ---------- */
  var bankcard=document.getElementById('bankcard');
  var blockBtn=document.getElementById('blockBtn');
  var blockLbl=document.getElementById('blockLbl');
  var blocked=false;
  blockBtn.addEventListener('click',function(){
    blocked=!blocked;
    bankcard.classList.toggle('blocked',blocked);
    blockBtn.setAttribute('aria-pressed',String(blocked));
    blockBtn.classList.toggle('on',blocked);
    blockLbl.textContent=blocked?'Desbloq.':'Bloquear';
    showToast(blocked?'Cartão bloqueado. Ninguém compra nada 🔒':'Cartão desbloqueado ✅');
  });
  var cardNum=document.getElementById('cardNum');
  var showDataBtn=document.getElementById('showDataBtn');
  var showingNum=false;
  showDataBtn.addEventListener('click',function(){
    showingNum=!showingNum;
    showDataBtn.setAttribute('aria-pressed',String(showingNum));
    cardNum.textContent=showingNum?'5312 9004 1187 4519':'5312 •••• •••• 4519';
    if(showingNum) showToast('Número visível — dados fictícios de demonstração 🙂');
  });

  /* ---------- planos / sheet ---------- */
  var PLANS={
    safe:{
      name:'Guardar com Segurança', tagline:'Estável e protegido',
      desc:'O jeito mais simples de começar. Seu USDC fica em reservas estáveis, rendendo um pouco todo ano — quase sem sobe-e-desce.',
      apy:'4–7%', min:'20 USDC', move:'Quase nada', cta:'Começar com 20 USDC',
      alloc:[{n:'Reservas estáveis em USDC',p:80,c:'#0E7A4A'},{n:'Estratégias de rendimento',p:15,c:'#A07C2C'},{n:'Reserva de caixa',p:5,c:'#B0563A'}]
    },
    steady:{
      name:'Crescer com Calma', tagline:'Crescimento equilibrado',
      desc:'Uma mistura equilibrada, feita para crescer com o tempo balançando só um pouco no caminho. A escolha do meio.',
      apy:'9–16%', min:'100 USDC', move:'Um pouco', cta:'Começar com 100 USDC',
      alloc:[{n:'Reservas estáveis em USDC',p:50,c:'#0E7A4A'},{n:'Estratégias de rendimento',p:40,c:'#A07C2C'},{n:'Reserva de caixa',p:10,c:'#B0563A'}]
    },
    fast:{
      name:'Crescer Mais Rápido', tagline:'Mais crescimento, mais sobe-e-desce',
      desc:'Busca o maior crescimento no longo prazo. Espere subidas e descidas maiores — melhor para dinheiro que você não vai precisar tão cedo.',
      apy:'20–45%', min:'400 USDC', move:'Bastante', cta:'Começar com 400 USDC',
      alloc:[{n:'Reservas estáveis em USDC',p:20,c:'#0E7A4A'},{n:'Estratégias de rendimento',p:70,c:'#A07C2C'},{n:'Reserva de caixa',p:10,c:'#B0563A'}]
    }
  };
  var sheet=document.getElementById('planSheet'), backdrop=document.getElementById('sheetBackdrop');
  function openPlan(id){
    var p=PLANS[id]; if(!p) return;
    document.getElementById('sheetTitle').textContent=p.name;
    document.getElementById('sheetTagline').textContent=p.tagline;
    document.getElementById('sheetDesc').textContent=p.desc;
    document.getElementById('sheetApy').textContent=p.apy;
    document.getElementById('sheetMin').textContent=p.min;
    document.getElementById('sheetMove').textContent=p.move;
    document.getElementById('sheetCta').textContent=p.cta;
    var bar=document.getElementById('allocBar'), leg=document.getElementById('allocLeg');
    bar.innerHTML=''; leg.innerHTML='';
    p.alloc.forEach(function(a){
      var seg=document.createElement('i');
      seg.style.width=a.p+'%'; seg.style.background=a.c; bar.appendChild(seg);
      var li=document.createElement('div'); li.className='li';
      var dot=document.createElement('i'); dot.style.background=a.c;
      var nm=document.createElement('span'); nm.textContent=a.n;
      var pv=document.createElement('b'); pv.textContent=a.p+'%';
      li.appendChild(dot); li.appendChild(nm); li.appendChild(pv); leg.appendChild(li);
    });
    sheet.classList.add('open'); backdrop.classList.add('open');
  }
  function closePlan(){sheet.classList.remove('open');backdrop.classList.remove('open');}
  document.querySelectorAll('[data-open-plan]').forEach(function(b){
    b.addEventListener('click',function(){openPlan(b.dataset.openPlan);});
  });
  backdrop.addEventListener('click',closePlan);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closePlan();});
  document.getElementById('sheetCta').addEventListener('click',function(){
    closePlan(); showToast('Boa escolha! 🎉 (isso é um protótipo)');
  });

  /* ---------- simulador ---------- */
  var simRange=document.getElementById('simRange');
  var simAmount=document.getElementById('simAmount');
  var simResult=document.getElementById('simResult');
  var months=12;
  function project(P,rate,m){return P*Math.pow(1+rate/100,m/12);}
  function renderSim(){
    var P=Number(simRange.value);
    simAmount.textContent=nf0.format(P);
    simResult.textContent=nf0.format(Math.round(project(P,9,months)))+' e '+nf0.format(Math.round(project(P,16,months)))+' USDC';
  }
  simRange.addEventListener('input',renderSim);
  document.querySelectorAll('#simPeriods .chip').forEach(function(ch){
    ch.addEventListener('click',function(){
      document.querySelectorAll('#simPeriods .chip').forEach(function(c){c.classList.remove('on');});
      ch.classList.add('on'); months=Number(ch.dataset.months); renderSim();
    });
  });
  renderSim();

  /* ---------- assistente ---------- */
  var ANSWERS={
    'O que é USDC?':'USDC é uma moeda digital que vale sempre 1 dólar americano. É como ter dólares no bolso, só que no celular — e aqui eles ainda rendem todo dia 🙂',
    'Quanto rendeu este mês?':'Este mês seu dinheiro rendeu 6,41 USDC até agora 📈 — somando os potes, a Caixinha e o cashback do cartão. Quer ver o detalhe de cada um?',
    'Meu dinheiro está seguro?':'Sim! Seu saldo fica em USDC, que vale sempre 1 dólar, e a maior parte fica em reservas estáveis. Você resgata quando quiser, sem multa 🙂',
    'Posso resgatar quando quiser?':'Pode! É só tocar em "Resgatar" na tela de Início. O USDC vira Pix na sua conta em segundos, sem multa e sem pegadinha.'
  };
  var msgs=document.getElementById('msgs');
  var suggestions=document.getElementById('suggestions');
  function addMsg(text,who){
    var d=document.createElement('div'); d.className='msg '+who; d.textContent=text;
    msgs.appendChild(d); d.scrollIntoView({block:'end',behavior:'smooth'});
    return d;
  }
  function botReply(text){
    var t=document.createElement('div'); t.className='msg bot typing';
    t.innerHTML='<i></i><i></i><i></i>';
    msgs.appendChild(t); t.scrollIntoView({block:'end'});
    setTimeout(function(){ t.remove(); addMsg(text,'bot'); },900);
  }
  function ask(q){
    addMsg(q,'user');
    botReply(ANSWERS[q] || 'Boa pergunta! No app de verdade eu respondo qualquer coisa na hora. Aqui na demo, experimente os botões de sugestão 🙂');
  }
  suggestions.addEventListener('click',function(e){
    var b=e.target.closest('[data-q]'); if(!b) return;
    suggestions.remove(); ask(b.dataset.q);
  });
  document.getElementById('chatForm').addEventListener('submit',function(e){
    e.preventDefault();
    var inp=document.getElementById('chatInput');
    var q=inp.value.trim(); if(!q) return;
    inp.value=''; ask(q);
  });

  /* ==================== FUNIL: LOGIN / CADASTRO / PERFIL ==================== */
  var auth=document.getElementById('auth');
  var ascreens=document.querySelectorAll('.ascreen');
  var userName='João';
  function aGoto(name){
    ascreens.forEach(function(s){s.classList.toggle('active', s.id==='a-'+name);});
  }
  document.querySelectorAll('[data-a]').forEach(function(b){
    b.addEventListener('click',function(){aGoto(b.dataset.a);});
  });

  function firstName(full){
    var n=(full||'').trim().split(/\s+/)[0];
    if(!n) return 'João';
    return n.charAt(0).toUpperCase()+n.slice(1);
  }
  function finishAuth(){
    document.getElementById('helloName').textContent=userName;
    document.getElementById('avatarBtn').textContent=userName.charAt(0).toUpperCase();
    auth.classList.add('hide');
    setTimeout(function(){auth.style.display='none';},400);
  }

  document.getElementById('loginForm').addEventListener('submit',function(e){
    e.preventDefault();
    var em=document.getElementById('loginEmail').value.trim();
    var pw=document.getElementById('loginPass').value;
    if(!em || !pw){ showToast('Preencha e-mail e senha para entrar 🙂'); return; }
    userName='João';
    finishAuth();
    showToast('Bem-vindo de volta! 👋');
  });

  document.getElementById('signupForm').addEventListener('submit',function(e){
    e.preventDefault();
    var nm=document.getElementById('suName').value.trim();
    var em=document.getElementById('suEmail').value.trim();
    var pw=document.getElementById('suPass').value;
    if(!nm){ showToast('Conta pra gente: como você se chama? 🙂'); return; }
    if(em.indexOf('@')<0){ showToast('Esse e-mail não parece completo — falta o @'); return; }
    if(pw.length<8){ showToast('A senha precisa de pelo menos 8 caracteres 🔒'); return; }
    if(!document.getElementById('suTerms').checked){ showToast('Falta aceitar os termos para continuar'); return; }
    userName=firstName(nm);
    startProfile();
    aGoto('profile');
  });

  var QUESTIONS=[
    { q:'O que você quer para o seu dinheiro?',
      opts:[
        {em:'🛡️', t:'Guardar com segurança', s:'Sem sustos, rendendo aos poucos', v:1},
        {em:'⚖️', t:'Crescer com calma', s:'Equilíbrio entre segurança e crescimento', v:2},
        {em:'🚀', t:'Crescer o máximo', s:'Aceito mais risco para render mais', v:3}
      ]},
    { q:'Você já investiu antes?',
      opts:[
        {em:'🌱', t:'Nunca', s:'Vai ser minha primeira vez', v:1},
        {em:'📗', t:'Um pouco', s:'Poupança, CDB ou parecido', v:2},
        {em:'📈', t:'Sim, bastante', s:'Já conheço o mercado', v:3}
      ]},
    { q:'Se seu saldo balançar por uns meses, você…',
      opts:[
        {em:'😟', t:'Prefiro que não balance', s:'Quero ver só subir', v:1},
        {em:'🙂', t:'Aguento um pouco', s:'Desde que cresça no fim', v:2},
        {em:'😎', t:'Tranquilo, faz parte', s:'Penso no longo prazo', v:3}
      ]}
  ];
  var qIdx=0, score=0;
  var PROFILES={
    calm:{name:'Tranquilo', pote:'Guardar com Segurança'},
    mid:{name:'Equilibrado', pote:'Crescer com Calma'},
    bold:{name:'Confiante', pote:'Crescer Mais Rápido'}
  };
  function startProfile(){ qIdx=0; score=0; renderQuestion(); }
  function renderQuestion(){
    var Q=QUESTIONS[qIdx];
    document.getElementById('aStepLbl').textContent='Pergunta '+(qIdx+1)+' de '+QUESTIONS.length;
    document.getElementById('aProgFill').style.width=((qIdx+1)/QUESTIONS.length*100)+'%';
    document.getElementById('aQ').textContent=Q.q;
    var box=document.getElementById('aOpts'); box.innerHTML='';
    Q.opts.forEach(function(o){
      var b=document.createElement('button');
      var em=document.createElement('span'); em.className='em'; em.textContent=o.em;
      var tx=document.createElement('span'); tx.textContent=o.t;
      var sm=document.createElement('small'); sm.textContent=o.s;
      tx.appendChild(sm);
      b.appendChild(em); b.appendChild(tx);
      b.addEventListener('click',function(){
        score+=o.v; qIdx++;
        if(qIdx<QUESTIONS.length){ renderQuestion(); }
        else{ aGoto('creating'); runCreation(); }
      });
      box.appendChild(b);
    });
  }

  function runCreation(){
    ['ck1','ck2','ck3'].forEach(function(id){document.getElementById(id).classList.remove('done');});
    setTimeout(function(){document.getElementById('ck1').classList.add('done');},700);
    setTimeout(function(){document.getElementById('ck2').classList.add('done');},1500);
    setTimeout(function(){document.getElementById('ck3').classList.add('done');},2300);
    setTimeout(function(){
      var p = score<=4 ? PROFILES.calm : (score<=7 ? PROFILES.mid : PROFILES.bold);
      document.getElementById('aDoneTitle').textContent='Tudo pronto, '+userName+'!';
      document.getElementById('aDoneText').innerHTML='Seu perfil de investidor é <b>'+p.name+'</b> — recomendamos começar pelo pote <b>'+p.pote+'</b>. Sua conta já aceita Pix e rende em USDC.';
      aGoto('done');
    },3100);
  }
  document.getElementById('aEnter').addEventListener('click',finishAuth);

  document.getElementById('avatarBtn').addEventListener('click',function(){
    auth.style.display='flex';
    setTimeout(function(){auth.classList.remove('hide');},30);
    aGoto('welcome');
    showToast('Você saiu da conta (demo) 👋');
  });
})();
</script>

</template>

<script>
(function(){
  'use strict';
  var hub=document.getElementById('hub');
  var viewer=document.getElementById('viewer');
  var vbMode=document.getElementById('vbMode');
  var frames={
    desktop:document.getElementById('frameDesktop'),
    mobile:document.getElementById('frameMobile')
  };
  var loaded={desktop:false, mobile:false};
  var labels={desktop:'· versão computador', mobile:'· versão celular'};

  /* marca a opção recomendada para o aparelho atual */
  var isSmall = Math.min(window.innerWidth, window.innerHeight) < 700 || matchMedia('(pointer:coarse)').matches;
  document.getElementById(isSmall?'chMobile':'chDesktop').classList.add('recommended');

  function open(mode){
    if(!loaded[mode]){
      frames[mode].srcdoc='<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"></head><body style="margin:0">'
        + document.getElementById('tpl-'+mode).innerHTML
        + '</body></html>';
      loaded[mode]=true;
    }
    frames.desktop.style.display = mode==='desktop' ? 'block':'none';
    frames.mobile.style.display  = mode==='mobile'  ? 'block':'none';
    vbMode.textContent=labels[mode];
    viewer.classList.add('open');
    hub.style.display='none';
  }
  function backToHub(){
    viewer.classList.remove('open');
    hub.style.display='flex';
  }

  document.querySelectorAll('.choice').forEach(function(c){
    c.addEventListener('click',function(){open(c.dataset.mode);});
  });
  document.getElementById('switchBtn').addEventListener('click',backToHub);
})();
</script>
